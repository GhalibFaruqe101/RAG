repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace        # Remove trailing whitespace
      - id: end-of-file-fixer          # Ensure files end with a newline
      - id: check-yaml                 # Validate YAML files
      - id: check-json                 # Validate JSON files
      - id: check-toml                 # Validate TOML files
      - id: check-merge-conflict       # Catch unresolved merge conflicts
      - id: check-added-large-files    # Prevent large files (default: 500KB)
        args: ['--maxkb=500']
      - id: detect-private-key         # Catch accidental API key commits
      - id: no-commit-to-branch        # Prevent direct commits to main/master
        args: ['--branch', 'main', '--branch', 'master']

  # Python code formatter (Black)
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=88']

  # Python import sorter (isort, compatible with Black)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black']

  # Python linter (flake8)
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=88', '--extend-ignore=E203,W503']

  # Security: scan for hardcoded secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline .secrets.baseline']
        exclude: \.env\.example$
